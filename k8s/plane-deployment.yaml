# Plane API & Web Deployment for Kubernetes
# TODO: Update image tags to match Plane version being deployed
# Apply: kubectl apply -f k8s/plane-deployment.yaml

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-web
  namespace: plane
  labels:
    app: plane
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: plane
      component: web
  template:
    metadata:
      labels:
        app: plane
        component: web
    spec:
      containers:
      - name: plane-web
        image: makeplane/plane-frontend:latest  # TODO: pin version
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: plane-secrets
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-api
  namespace: plane
  labels:
    app: plane
    component: api
spec:
  replicas: 5
  selector:
    matchLabels:
      app: plane
      component: api
  template:
    metadata:
      labels:
        app: plane
        component: api
    spec:
      containers:
      - name: plane-api
        image: makeplane/plane-backend:latest  # TODO: pin version
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: plane-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: '2'
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-worker
  namespace: plane
  labels:
    app: plane
    component: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: plane
      component: worker
  template:
    metadata:
      labels:
        app: plane
        component: worker
    spec:
      containers:
      - name: plane-worker
        image: makeplane/plane-backend:latest  # TODO: pin version
        command: ["python", "manage.py", "celery"]
        envFrom:
        - secretRef:
            name: plane-secrets
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: '1'
            memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: plane-web
  namespace: plane
spec:
  selector:
    app: plane
    component: web
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: plane-api
  namespace: plane
spec:
  selector:
    app: plane
    component: api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
