# Plane Nginx Reverse Proxy Configuration
# Place this in /etc/nginx/conf.d/plane.conf or use with Docker

upstream plane-web {
    server plane-web:3000;
}

upstream plane-api {
    server plane-api:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name plane.sentinel.internal;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name plane.sentinel.internal;

    # ============================================================
    # SSL Configuration
    # ============================================================
    ssl_certificate     /etc/nginx/ssl/plane.crt;
    ssl_certificate_key /etc/nginx/ssl/plane.key;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    # ============================================================
    # Security Headers
    # ============================================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss:;" always;

    # ============================================================
    # IP Restriction (Internal Network Only)
    # ============================================================
    # Uncomment and adjust for your internal network
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    # deny all;

    # ============================================================
    # General Settings
    # ============================================================
    client_max_body_size 50m;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # ============================================================
    # API Proxy
    # ============================================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://plane-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Login rate limiting (stricter)
    location /api/sign-in/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://plane-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # WebSocket Proxy (Real-time features)
    # ============================================================
    location /ws/ {
        proxy_pass http://plane-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # ============================================================
    # Web App
    # ============================================================
    location / {
        proxy_pass http://plane-web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # Static files caching
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://plane-web;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block sensitive paths
    location ~ /\. {
        deny all;
    }
}
