version: '3.8'

services:
  plane-db:
    image: postgres:15.7-alpine
    container_name: plane-app-plane-db-1
    command: postgres -c 'max_connections=1000'
    restart: always
    environment:
      PGHOST: ${PGHOST:-plane-db}
      PGDATABASE: ${PGDATABASE:-plane}
      POSTGRES_USER: ${POSTGRES_USER:-plane}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plane}
      POSTGRES_DB: ${POSTGRES_DB:-plane}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    container_name: plane-app-plane-redis-1
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - default

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-app-plane-mq-1
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-plane}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-plane}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - default

  plane-minio:
    image: minio/minio:latest
    container_name: plane-app-plane-minio-1
    command: server /export --console-address ":9090"
    restart: always
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-plane-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-secret-key}
    volumes:
      - uploads:/export
    networks:
      - default

volumes:
  pgdata:
  redisdata:
  rabbitmq_data:
  uploads:

networks:
  default:
    name: plane-network
