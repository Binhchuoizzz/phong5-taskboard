version: '3.8'

services:
  proxy:
    image: makeplane/plane-proxy:${APP_RELEASE:-v1.3.1}
    container_name: plane-app-proxy-1
    restart: always
    ports:
      - target: 80
        published: ${LISTEN_HTTP_PORT:-80}
        protocol: tcp
        mode: host
      - target: 443
        published: ${LISTEN_HTTPS_PORT:-443}
        protocol: tcp
        mode: host
    volumes:
      - proxy_config:/config
      - proxy_data:/data
      - /home/binhchuoiz/Projects/Personal/NoteAppC12/plane-app/Caddyfile:/etc/caddy/Caddyfile
    env_file:
      - plane.env
    environment:
      BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
      CERT_EMAIL: ${CERT_EMAIL}
      CERT_ACME_CA: ${CERT_ACME_CA}
      CERT_ACME_DNS: ${CERT_ACME_DNS}
      LISTEN_HTTP_PORT: ${LISTEN_HTTP_PORT:-80}
      LISTEN_HTTPS_PORT: ${LISTEN_HTTPS_PORT:-443}
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    networks:
      - default
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  proxy_config:
  proxy_data:

networks:
  default:
    name: plane-network
    external: true
