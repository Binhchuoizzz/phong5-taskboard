name: CI — Unit Tests

on:
  push:
    branches: [ master, "fix/**", "hotfix/**" ]
  pull_request:
    branches: [ master ]

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run unit tests
        run: |
          python3 -m unittest discover -s tests/unit -v

      - name: Check for accidental secret leaks
        run: |
          # Fail CI if any known sensitive patterns are committed
          if grep -rE "sentinel\.local|CHANGE_ME(?!_USE_STRONG_PASSWORD|_64_CHARS|_USE_STRONG)" \
            --include="*.py" --include="*.sh" --include="*.md" \
            --include="*.yaml" --include="*.yml" \
            --exclude-dir=".git" --exclude-dir=".venv" .; then
            echo "❌ Potential secret pattern detected in source files!"
            exit 1
          fi
          echo "✅ No hardcoded secret patterns detected."
