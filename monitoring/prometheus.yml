# Prometheus monitoring placeholder
# See docs/07-monitoring.md for full setup instructions
# This file will be expanded when monitoring stack is deployed

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Node metrics (install node-exporter first)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Container metrics (commented out due to read-only mount on host)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # PostgreSQL metrics (install postgres-exporter first)
  # - job_name: 'postgres-exporter'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis metrics (install redis-exporter first)
